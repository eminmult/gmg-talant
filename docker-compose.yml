services:
  gmg-web:
    image: nginx:alpine
    container_name: gmg-web
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gmg-network

  gmg-admin-php:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: gmg-admin-php
    restart: unless-stopped
    volumes:
      - ./admin:/var/www/html
      - ./admin/docker/php.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    working_dir: /var/www/html
    networks:
      - gmg-network

  gmg-admin-web:
    image: nginx:alpine
    container_name: gmg-admin-web
    restart: unless-stopped
    ports:
      - "8091:80"
    volumes:
      - ./admin:/var/www/html
      - ./nginx/admin.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gmg-admin-php
    networks:
      - gmg-network

networks:
  gmg-network:
    driver: bridge
